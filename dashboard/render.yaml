services:
  - type: web
    name: NeoTrade
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.6
      - key: DASHBOARD_PASSWORD
        value: neiltrade123
